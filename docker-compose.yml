# 3d-scan Docker Compose 部署
#
# 启动: docker compose up -d
# 查看: docker compose logs -f app
# 停止: docker compose down

services:
  app:
    build:
      context: .
      args:
        INSTALL_GPU: ${INSTALL_GPU:-1}
    image: 3d-scan:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8000"
    environment:
      - OPENBLAS_NUM_THREADS=4
      - HF_ENDPOINT=https://hf-mirror.com
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/output
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./uploads:/app/uploads
      - /root/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]